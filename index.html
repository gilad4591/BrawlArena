<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0e1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Brawl Arena</title>
    <!-- Google AdSense loader: required for site verification/review, and reused
         by AdService for the in-game banner unit (id keeps it from loading twice). -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9834744561471352"
      crossorigin="anonymous" id="adsense-lib"></script>
    <!-- Inline so it paints instantly (before CSS/JS), covering the blank->menu
         swap on first load. Removed by main.js once the menu is ready. -->
    <style>
      html, body { margin: 0; background: #0b0e1a; }
      /* Same artwork + scrim as the menu, so when this fades out the background
         doesn't change — only the logo/buttons fade in (no double-logo flash). */
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: flex-end; justify-content: center;
        background: #0b0e1a url('/ui/menu-splash.png?v=9') center / cover no-repeat;
        transition: opacity 0.4s ease;
      }
      #boot-splash::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(180deg, rgba(6,8,16,0.5) 0%, rgba(6,8,16,0.15) 40%, rgba(6,8,16,0.85) 100%);
      }
      #boot-splash.hide { opacity: 0; pointer-events: none; }
      #boot-splash .bs-sub {
        position: relative; z-index: 1; margin-bottom: 14%;
        color: #cdd6f4; font: 600 13px system-ui, sans-serif;
        letter-spacing: 0.3em; text-transform: uppercase;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="bs-sub">Loading…</div>
    </div>
    <div id="app"></div>
    <!-- Web ad slot (AdSense on browser builds; hidden on native where AdMob draws its own banner) -->
    <div id="ad-banner" class="ad-banner hidden"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
