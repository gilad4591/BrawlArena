<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png?v=3" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0e1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Brawl Arena</title>
    <meta name="description" content="Brawl Arena — a fast, arcade-style fighting game. Pick a fighter, master combos and specials, and own the arena." />
    <link rel="canonical" href="https://brawl-arena.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Brawl Arena" />
    <meta property="og:url" content="https://brawl-arena.com/" />
    <meta property="og:title" content="Brawl Arena" />
    <meta property="og:description" content="Pick a fighter. Own the arena." />
    <meta property="og:image" content="https://brawl-arena.com/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brawl Arena" />
    <meta name="twitter:description" content="Pick a fighter. Own the arena." />
    <meta name="twitter:image" content="https://brawl-arena.com/logo.png" />
    <!-- Google AdSense + H5 Games Ads loader. Required for site verification and
         reused by AdService for the between-matches interstitial (adBreak). The
         data-* attrs opt this page into Google's built-in web-game ad system:
           data-ad-frequency-hint  – minimum spacing Google aims for between ads
           data-adbreak-test="on"  – shows Google TEST ad breaks during dev;
                                      REMOVE before production (same step as
                                      flipping ADS.useTestAds to false). -->
    <script async data-ad-frequency-hint="45s"
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9834744561471352"
      crossorigin="anonymous" id="adsense-lib"></script>
    <script>
      window.adsbygoogle = window.adsbygoogle || [];
      // The H5 Games Ads API: adBreak() requests a full-screen ad between
      // gameplay; adConfig() sets global options. Both just enqueue onto adsbygoogle.
      window.adBreak = window.adConfig = function (o) { window.adsbygoogle.push(o); };
    </script>
    <!-- Inline so it paints instantly (before CSS/JS), covering the blank->menu
         swap on first load. Removed by main.js once the menu is ready. -->
    <style>
      html, body { margin: 0; background: #0b0e1a; }
      /* Branded loading screen over the menu artwork. Shares the menu's image +
         scrim so the fade-out only swaps the logo/buttons in (no flash). */
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #0b0e1a url('/ui/menu-splash.png?v=9') center / cover no-repeat;
        transition: opacity 0.4s ease;
      }
      #boot-splash::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(180deg, rgba(6,8,16,0.55) 0%, rgba(6,8,16,0.25) 45%, rgba(6,8,16,0.88) 100%);
      }
      #boot-splash.hide { opacity: 0; pointer-events: none; }
      #boot-splash .bs-wrap {
        position: relative; z-index: 1; text-align: center;
        display: flex; flex-direction: column; align-items: center; gap: 20px;
        animation: bs-pop 0.5s ease both;
      }
      @keyframes bs-pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
      #boot-splash .bs-badge {
        width: clamp(72px, 16vw, 104px); height: auto; display: block;
        filter: drop-shadow(0 6px 18px rgba(0,0,0,0.55));
      }
      #boot-splash .bs-logo {
        font: 900 clamp(2.6rem, 9vw, 4.4rem)/0.9 system-ui, sans-serif;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #ff5d3b, #ffb03b);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        filter: drop-shadow(0 3px 10px rgba(0,0,0,0.7)) drop-shadow(0 4px 18px rgba(255,93,59,0.35));
      }
      #boot-splash .bs-logo span {
        display: block; -webkit-text-fill-color: #eef1ff; color: #eef1ff;
        font-size: 0.44em; letter-spacing: 10px; margin-top: 6px;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      }
      #boot-splash .bs-loader {
        width: min(260px, 60vw); height: 6px; border-radius: 999px;
        background: rgba(255,255,255,0.14); overflow: hidden;
      }
      #boot-splash .bs-loader i {
        display: block; height: 100%; width: 8%; border-radius: 999px;
        background: linear-gradient(90deg, #ff5d3b, #ffb03b);
        transition: width 0.9s cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      #boot-splash .bs-sub {
        color: #cdd6f4; font: 600 12px system-ui, sans-serif;
        letter-spacing: 0.3em; text-transform: uppercase;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="bs-wrap">
        <img class="bs-badge" src="/icons/icon-192.png?v=3" alt="" width="96" height="96" />
        <div class="bs-logo">BRAWL<span>ARENA</span></div>
        <div class="bs-loader"><i id="boot-bar"></i></div>
        <div class="bs-sub">Loading…</div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
